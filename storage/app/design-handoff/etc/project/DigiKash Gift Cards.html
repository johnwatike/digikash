<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>DigiKash · Gift Cards — Design</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="gift-cards/tokens.css"/>

<style>
  html, body { margin: 0; padding: 0; background: #0a0a14; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="gift-cards/design-canvas.jsx"></script>
<script type="text/babel" src="gift-cards/gift-card-design.jsx"></script>
<script type="text/babel" src="gift-cards/chrome.jsx"></script>
<script type="text/babel" src="gift-cards/screen1-index.jsx"></script>
<script type="text/babel" src="gift-cards/screen2-create.jsx"></script>
<script type="text/babel" src="gift-cards/screen3-public.jsx"></script>
<script type="text/babel" src="gift-cards/screen4-redeem.jsx"></script>
<script type="text/babel" src="gift-cards/screen5-admin.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const App = () => (
  <DesignCanvas title="DigiKash · Gift Cards" subtitle="Five screens · in-app dashboard, recipient view, and admin">
    <DCSection id="userflow" title="User Flow — Send, Receive, Redeem">
      <DCArtboard id="s1-index"   label="01 · Index — embeds in your existing wallet layout"  width={1180} height={1120}>
        <Screen1Index/>
      </DCArtboard>
      <DCArtboard id="s2-create"  label="02 · Create — 4-step wizard with live preview"        width={1180} height={1240}>
        <Screen2Create/>
      </DCArtboard>
      <DCArtboard id="s3-public"  label="03 · Recipient — public 'you got a gift' page"        width={720}  height={1480}>
        <Screen3Public/>
      </DCArtboard>
      <DCArtboard id="s4-redeem"  label="04 · Redeem — verified state shown"                   width={1180} height={1120}>
        <Screen4Redeem/>
      </DCArtboard>
    </DCSection>

    <DCSection id="admin" title="Admin">
      <DCArtboard id="s5-admin"   label="05 · Template Manager — table + edit drawer"          width={1180} height={1140}>
        <Screen5Admin/>
      </DCArtboard>
    </DCSection>

    <DCSection id="component" title="Reusable: <x-gift-card-design> — 6 template variants">
      <DCArtboard id="tpl-birthday"    label="birthday"        width={420} height={290}>
        <ComponentShowcase template="birthday"/>
      </DCArtboard>
      <DCArtboard id="tpl-holiday"     label="holiday"         width={420} height={290}>
        <ComponentShowcase template="holiday"/>
      </DCArtboard>
      <DCArtboard id="tpl-thankyou"    label="thankyou"        width={420} height={290}>
        <ComponentShowcase template="thankyou"/>
      </DCArtboard>
      <DCArtboard id="tpl-anniversary" label="anniversary"     width={420} height={290}>
        <ComponentShowcase template="anniversary"/>
      </DCArtboard>
      <DCArtboard id="tpl-congrats"    label="congrats"        width={420} height={290}>
        <ComponentShowcase template="congrats"/>
      </DCArtboard>
      <DCArtboard id="tpl-premium"     label="premium (default)" width={420} height={290}>
        <ComponentShowcase template="premium"/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

const ComponentShowcase = ({ template }) => (
  <div style={{
    width: '100%', height: '100%',
    background: 'linear-gradient(180deg, #F4F6FB 0%, #EEF2FF 100%)',
    display: 'grid', placeItems: 'center',
    padding: 20,
  }}>
    <GiftCardDesign template={template} width={360} amount={100} recipient="Recipient Name" sender="Your Name"/>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#0F1B3F"/>
    <rect x="36" y="58" width="128" height="84" rx="12" fill="url(#g)"/>
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#FB7185"/>
        <stop offset="100%" stop-color="#BE185D"/>
      </linearGradient>
    </defs>
    <rect x="46" y="68" width="50" height="6" rx="3" fill="#fff" opacity=".8"/>
    <text x="100" y="120" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="22" fill="#fff">GIFT</text>
  </svg>
</template>
</body>
</html>
