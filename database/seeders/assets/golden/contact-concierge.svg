<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#16161E"/>
			<stop offset="100%" stop-color="#06060A"/>
		</linearGradient>
		<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#F5E6A8"/>
			<stop offset="50%" stop-color="#D4AF37"/>
			<stop offset="100%" stop-color="#B8860B"/>
		</linearGradient>
		<radialGradient id="glow" cx="50%" cy="40%" r="55%">
			<stop offset="0%" stop-color="rgba(212,175,55,0.22)"/>
			<stop offset="100%" stop-color="rgba(212,175,55,0)"/>
		</radialGradient>
	</defs>
	<rect width="600" height="800" fill="url(#bg)"/>
	<rect width="600" height="800" fill="url(#glow)"/>

	<!-- Vault-door illustration -->
	<g transform="translate(300,400)">
		<circle cx="0" cy="0" r="220" fill="#0A0A0F" stroke="url(#gold)" stroke-width="2.5" opacity=".9"/>
		<circle cx="0" cy="0" r="200" fill="none" stroke="url(#gold)" stroke-width="1" opacity=".6"/>
		<circle cx="0" cy="0" r="160" fill="none" stroke="#D4AF37" stroke-width="0.6" opacity=".4"/>

		<!-- Tumblers / spokes -->
		<g stroke="url(#gold)" stroke-width="2" fill="none" opacity=".75">
			<line x1="0" y1="-220" x2="0" y2="-180"/>
			<line x1="220" y1="0" x2="180" y2="0"/>
			<line x1="0" y1="220" x2="0" y2="180"/>
			<line x1="-220" y1="0" x2="-180" y2="0"/>
			<line x1="156" y1="-156" x2="127" y2="-127"/>
			<line x1="156" y1="156" x2="127" y2="127"/>
			<line x1="-156" y1="156" x2="-127" y2="127"/>
			<line x1="-156" y1="-156" x2="-127" y2="-127"/>
		</g>

		<!-- Central wheel -->
		<circle cx="0" cy="0" r="64" fill="url(#gold)" opacity=".95"/>
		<circle cx="0" cy="0" r="64" fill="#0A0A0F" opacity=".55"/>
		<circle cx="0" cy="0" r="40" fill="none" stroke="url(#gold)" stroke-width="2"/>
		<text x="0" y="11" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif"
		      font-style="italic" font-weight="600" font-size="36" fill="url(#gold)">DK</text>
	</g>

	<!-- Trust phrase at bottom -->
	<text x="300" y="720" text-anchor="middle" font-family="Cinzel, Georgia, serif"
	      font-size="14" letter-spacing="6" fill="#B8B2A0" opacity=".7">CONCIERGE · 24/7</text>

	<!-- Corner ornaments -->
	<g stroke="#D4AF37" stroke-width="1.4" fill="none" opacity=".75">
		<path d="M20 20 L60 20 M20 20 L20 60"/>
		<path d="M580 20 L540 20 M580 20 L580 60"/>
		<path d="M20 780 L60 780 M20 780 L20 740"/>
		<path d="M580 780 L540 780 M580 780 L580 740"/>
	</g>
</svg>
