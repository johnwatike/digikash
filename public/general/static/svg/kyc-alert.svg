<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 64 64" fill="none">

    <!-- ID Card -->
    <rect x="4" y="14" width="36" height="26" rx="4" fill="#EAF2FF" stroke="#4C6FFF" stroke-width="2"/>

    <!-- Avatar -->
    <circle cx="16" cy="24" r="4" fill="#4C6FFF"/>
    <path d="M10 32c1.8-3 10.2-3 12 0" fill="#4C6FFF"/>

    <!-- Text lines -->
    <rect x="24" y="22" width="10" height="2" rx="1" fill="#A8B6FF"/>
    <rect x="24" y="27" width="10" height="2" rx="1" fill="#A8B6FF"/>

    <!-- Magnifying Glass -->
    <circle cx="44" cy="22" r="8" stroke="#38BDF8" stroke-width="3" fill="#DFF6FF"/>
    <line x1="49" y1="27" x2="56" y2="34" stroke="#4C6FFF" stroke-width="3" stroke-linecap="round"/>

    <!-- Warning Triangle -->
    <path d="M44 34 L54 50 L34 50 Z" fill="#FFC107" stroke="#F59E0B" stroke-width="2"/>
    <rect x="43" y="40" width="2" height="6" fill="white"/>
    <circle cx="44" cy="48" r="1.3" fill="white"/>

</svg>